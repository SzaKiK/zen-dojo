<div class="reset-page">
  <header class="header">
    <a routerLink="/login" class="back-btn">
      <span class="material-icons">arrow_back</span>
    </a>
    <div class="logo">
      <span class="material-icons">shield</span>
      <span class="brand">DHKSE</span>
    </div>
  </header>

  <div class="reset-content">
    <h1>Új jelszó beállítása</h1>
    <p class="subtitle">Add meg az új jelszavad a fiókodhoz.</p>

    @if (error) {
      <div class="error-message">{{ error }}</div>
    }

    @if (message) {
      <div class="success-message">{{ message }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="reset-form">
      <div class="form-group">
        <label for="password">Új jelszó</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Új jelszó újra</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Mentés...' : 'Jelszó frissítése' }}
        <span class="material-icons">lock_reset</span>
      </button>
    </form>
  </div>
</div>
